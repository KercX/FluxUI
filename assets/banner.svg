    <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>
    <text x="400" y="90" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">Flux UI</text>
